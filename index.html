<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LottoApp CRL | Semanario Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glass-container">
        <header>
            <h1 class="neon-text">LOTTOAPP CRL</h1>
            <div class="search-box">
                <input type="date" id="date-picker" onchange="changeDate()">
            </div>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr id="header-days">
                        <th>HORA</th>
                        <th>L</th><th>M</th><th>M</th><th>J</th><th>V</th><th>S</th><th>D</th>
                    </tr>
                </thead>
                <tbody id="main-table">
                    </tbody>
            </table>
        </div>

        <div class="action-bar">
            <div id="save-status" style="color: #39ff14; text-align: center; font-size: 0.7rem; margin-bottom: 8px; font-weight: bold;">Semanario Activo</div>
            <button onclick="saveAllToSupabase()" class="btn-save-manual">💾 GUARDAR TODA LA SEMANA</button>
            <div style="display: flex; gap: 8px;">
                <button onclick="resetView()" class="btn-reset" style="flex: 1;">🔄 LIMPIAR VISTA</button>
                <button onclick="searchByMonth()" class="btn-reset" style="flex: 1; border-color: #00e5ff; color: #00e5ff;">🔍 BUSCAR MES</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
